<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Job Posting Detector</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            width:90%;
            max-width:900px;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        .stats{
            display:flex;
            gap:15px;
            margin-bottom:25px;
        }

        .card{
            flex:1;
            background:#f8f9fa;
            padding:15px;
            border-radius:12px;
            text-align:center;
        }

        .card h3{
            color:#667eea;
            margin-bottom:5px;
        }

        textarea{
            width:100%;
            height:250px;
            padding:15px;
            border:2px solid #ddd;
            border-radius:12px;
            resize:none;
            font-size:15px;
        }

        textarea:focus{
            outline:none;
            border-color:#667eea;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#667eea;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#5a67d8;
        }

        .result-card{
            margin-top:30px;
            padding:20px;
            border-radius:12px;
            text-align:center;
        }

        .fake{
            background:#ffe5e5;
            color:#c53030;
        }

        .real{
            background:#e6ffed;
            color:#2f855a;
        }

        .risk{
            font-size:20px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .confidence{
            margin-top:15px;
            font-size:18px;
            font-weight:bold;
        }

        .progress-container{
            width:100%;
            height:18px;
            background:#ddd;
            border-radius:20px;
            margin-top:15px;
            overflow:hidden;
        }

        .progress-bar{
            height:100%;
            background:#667eea;
        }

        .footer{
            text-align:center;
            margin-top:25px;
            color:#888;
            font-size:14px;
        }

        @media(max-width:768px){

            .stats{
                flex-direction:column;
            }

            .container{
                width:95%;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Fake Job Posting Detector</h1>

    <p class="subtitle">
        Detect fraudulent job advertisements using Machine Learning
    </p>

    

    <form action="/predict" method="POST">

        <textarea
            name="job_text"
            placeholder="Paste a complete job description here..."
            required>{{ job_text }}</textarea>

        <button type="submit">
            Analyze Job Posting
        </button>

    </form>

    {% if prediction_text %}

    <div class="result-card {% if 'Fake' in prediction_text %}fake{% else %}real{% endif %}">

        <div class="risk">
            {{ risk_level }}
        </div>

        <h2>{{ prediction_text }}</h2>

        <div class="confidence">
            Confidence: {{ probability }}%
        </div>

        <div class="progress-container">
            <div
                class="progress-bar"
                style="width: {{ probability }}%;">
            </div>
        </div>

    </div>

    {% endif %}

    

</div>

</body>
</html>
